<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消失的白色巨獸：冰川消融與氣候危機 (互動焦點與滾動敘事)</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Remixicon -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <!-- Marked.js Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Fixed Scroll Progress Bar -->
  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progressBarFill"></div>
  </div>

  <!-- Main Full-Screen Fixed Image Stage -->
  <div class="fixed-bg-stage" id="bgStage">
    <!-- ONLY the image canvas wrapper zooms and shifts origin -->
    <div class="zoom-canvas" id="zoomCanvas">
      <div class="comparison-wrapper vertical" id="comparisonWrapper">
        <div class="img-wrapper before-wrapper">
          <img src="before.jpg" alt="消融前 (Before)" class="bg-img">
          <div class="label label-top">2000 年 (Before)</div>
        </div>
        <div class="img-wrapper after-wrapper" id="afterWrapper">
          <img src="after.jpg" alt="消融後 (After)" class="bg-img">
          <div class="label label-bottom">2024 年 (After)</div>
        </div>
      </div>
    </div>

    <!-- Pulsing Red Circle Focal Point Marker -->
    <div class="focus-marker" id="focusMarker">
      <div class="pulse-ring"></div>
      <div class="marker-dot"></div>
      <div class="marker-tag" id="markerTag">
        <span id="markerText">焦點區域</span>
      </div>
    </div>

    <!-- Left-Anchored Unscaled Draggable Slider Handle -->
    <div class="slider-handle" id="sliderHandle" role="slider" aria-label="圖片比較分割線" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0" title="按住拖動，或點擊自動切換至另一側">
      <div class="handle-line"></div>
      <div class="handle-button" id="handleButton">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Narrative Overlay Column (Dynamic Markdown JSON Rendered) -->
  <main class="story-overlay" id="storyOverlay">
    <!-- Hero Title Card Container -->
    <div id="heroContainer"></div>

    <!-- Narrative Chapters Stream Container -->
    <div class="narrative-stream" id="narrativeStream">
      <div class="loading-spinner">載入故事數據中...</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
