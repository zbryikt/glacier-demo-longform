<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球能源轉型與 2100 氣候 GDP 計算器</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Remixicon -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main Grid Layout -->
  <main class="calc-container">

    <!-- Left Controls Panel -->
    <aside class="controls-panel">

      <!-- Demand Constraint Balance Meter with Stacked Energy Mix Bar inside -->
      <div class="demand-meter-box">
        <div class="demand-meter-header">
          <div class="demand-title-group">
            <span class="demand-title">全球能源供需與配比結構</span>
            <span class="demand-val" id="totalDemandVal">100.0%</span>
          </div>
          <div class="auto-balance-group" title="開啟時調動某能源會自動補足乾淨能源">
            <span class="toggle-text">自動平衡</span>
            <label class="toggle-switch">
              <input type="checkbox" id="autoBalanceToggle" checked>
              <span class="slider-round"></span>
            </label>
          </div>
        </div>

        <!-- Integrated Multi-Color Stacked Energy Mix Bar inside Demand Meter -->
        <div class="demand-stacked-bar" id="demandStackedBar">
          <!-- Stacked color segments rendered by app.js -->
        </div>

        <!-- Bottom Row: Left Status + Right Annual Transition Investment (% GDP) -->
        <div class="demand-bottom-row">
          <div class="demand-status-text" id="demandStatusText">
            <i class="ri-checkbox-circle-fill"></i> 供需平衡：100% 需求滿足
          </div>
          <div class="gdp-investment-badge" id="gdpInvestmentBadge" title="每年全球 GDP 投入綠能建置與電網比率">
            年均轉型投資: <span id="metricCapex">1.2% GDP</span>
          </div>
        </div>
      </div>

      <!-- Shortened Presets Bar between Demand Meter & Compact Energy Rows -->
      <div class="short-presets-row" id="shortPresetContainer">
        <span class="short-preset-label">快速情境：</span>
        <button class="short-preset-btn active" data-id="bau">現況</button>
        <button class="short-preset-btn" data-id="paris">巴黎協定</button>
        <button class="short-preset-btn" data-id="nuclear_heavy">All in 核能</button>
        <button class="short-preset-btn" data-id="renewable_rush">All in 再生</button>
      </div>

      <!-- Ultra Compact Energy Color Bars List Container (No Border, No Margin) -->
      <div class="compact-energy-list" id="slidersList">
        <!-- Rendered dynamically by app.js: name [info-circle] [bar] percent lock -->
      </div>
    </aside>

    <!-- Right Interactive Dashboards & Real-time Canvas Charts -->
    <section class="viz-dashboard">

      <!-- 2025 - 2100 CO2 Trajectory Chart -->
      <div class="viz-box">
        <div class="box-header">
          <h3><i class="ri-line-chart-line"></i> 2025–2100 全球碳排放軌跡 (Gt CO₂ / 年)</h3>
        </div>
        <canvas id="trajectoryCanvas" width="760" height="200"></canvas>
      </div>

      <!-- Thermometer & City Submersion Vertical Bar Scale Visualizer -->
      <div class="viz-box gauge-flex-box">

        <!-- 2100 Thermometer (Live Temp embedded in header!) -->
        <div class="gauge-card">
          <div class="gauge-title">
            <span><i class="ri-thermometer-line"></i> 2100 地球平均升溫</span>
            <span class="gauge-live-val alert-temp-text" id="thermoLiveVal">+3.6°C</span>
          </div>
          <div class="thermometer-visual">
            <div class="thermo-tube">
              <div class="thermo-fill" id="thermoFill" style="height: 70%;"></div>
            </div>
            <div class="thermo-marks">
              <span>+4.5°C (失控)</span>
              <span>+3.6°C (BAU 現況)</span>
              <span>+2.0°C (巴黎上限)</span>
              <span>+1.5°C (淨零安全線)</span>
            </div>
          </div>
        </div>

        <!-- 2100 Sea Level City Submersion Scale Bar (Live Sea Level embedded in header!) -->
        <div class="gauge-card city-submersion-card">
          <div class="gauge-title">
            <span><i class="ri-anchor-line"></i> 2100 海平面預計上升</span>
            <span class="gauge-live-val alert-sea-text" id="seaLiveVal">115.0 cm</span>
          </div>
          
          <div class="city-submersion-wrapper">
            <!-- Vertical Rising Water Fill Tube Bar -->
            <div class="city-water-bar-container">
              <div class="city-water-fill" id="cityWaterFill" style="height: 75%;"></div>
            </div>

            <!-- Cities Elevation Markers (Bottom to Top) -->
            <div class="city-markers-list" id="cityMarkersList">
              <!-- Rendered dynamically by app.js from bottom (25cm) to top (135cm) -->
            </div>
          </div>
        </div>

      </div>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
